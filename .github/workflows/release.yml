name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux
          - os: macos-latest
            artifact_name: macos
          - os: windows-latest
            artifact_name: windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux deps for Tauri build
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Check release metadata
        run: bash scripts/check-release-metadata.sh

      - name: Build desktop bundles
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            export CC=gcc
            export CXX=g++
          fi
          bun run tauri build

      - name: Build CLI release binary
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --release --locked --bin hermes

      - name: Package Linux release assets
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/package-release-assets.sh release-assets

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

      - name: Upload Linux binary release assets
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: hermes-linux-bin
          path: release-assets/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: hermes-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
